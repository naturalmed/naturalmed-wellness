short_bio: "Nuno Pestana is a practitioner of Traditional Chinese Medicine based in Newtown, Powys. He graduated from Chengdu University of Traditional Chinese Medicine and is a Member of the Association of Traditional Chinese Medicine UK (ATCM)."
full_bio: "Nuno graduated from **Chengdu University of Traditional Chinese Medicine** — one of the oldest and most respected TCM institutions in China.\n\nWith over 10 years of clinical experience, he has helped hundreds of patients with acupuncture, herbal medicine, Tuina massage and dietary therapy.\n\nHe is a registered Member of the **Association of Traditional Chinese Medicine UK (ATCM)** and holds a BSc in Traditional Chinese Medicine."
quote: "It is my mission to look after you and provide an alternative solution to your health problems."
