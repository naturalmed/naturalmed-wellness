name: Build Articles & Pages

on:
  push:
    paths:
      - '_content/articles/**'
      - '_content/seminars.yml'
      - '_content/pages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown pyyaml

      - name: Build articles, seminars and page text
        run: python3 tools/build_articles.py

      - name: Commit built files
        run: |
          git config user.name  "NaturalMed CMS Bot"
          git config user.email "naturalmed.wellness@gmail.com"
          git add en/articles/*.html en/articles.html feed.xml \
                  en/seminars.html en/index.html en/about.html \
                  en/conditions.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Build: update site from CMS content"
          git push
